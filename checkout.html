<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Lumière</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TEALIUM TAG WILL GO HERE (Step 3) -->
  <script type="text/javascript">
var utag_data = {
   page_type   : "purchase_amar",
   order_id    : "LUM-ABC123",
   order_total : "133.99"
}
</script>
<!-- Loading script asynchronously -->
<script type="text/javascript">
    (function(a,b,c,d){
    a='https://tags.tiqcdn.com/utag/analyticsintelligence-training/main/dev/utag.js';
    b=document;c='script';d=b.createElement(c);d.src=a;d.type='text/java'+c;d.async=true;
    a=b.getElementsByTagName(c)[0];a.parentNode.insertBefore(d,a);
    })();
</script>
 
 

  <nav>
    <div class="nav-logo">LUMIÈRE</div>
    <div class="nav-links">
      <a href="index.html">Continue Shopping</a>
    </div>
  </nav>

  <div class="page-container" style="text-align:center; padding-top: 80px;">
    <div class="success-icon" style="margin: 0 auto 24px;">✓</div>
    <div class="order-ref">ORDER CONFIRMED</div>
    <div class="order-number" id="order-number"></div>
    <p style="color: var(--text-muted); font-size: 14px; max-width: 400px; margin: 0 auto 40px; line-height: 1.8;">
      Thank you for your purchase. You'll receive a confirmation email shortly. Your order will be dispatched within 2–3 working days.
    </p>

    <div id="order-summary" style="text-align:left; margin-bottom: 40px;"></div>

    <a href="index.html">
      <button class="btn" style="padding: 14px 40px; font-size: 14px;">Back to Shop</button>
    </a>
  </div>

  <script>
    // Generate order reference
    const ref = 'LUM-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('order-number').textContent = ref;

    // Show order summary from cart
    const cart = JSON.parse(localStorage.getItem('lumiere_cart') || '[]');
    if (cart.length > 0) {
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      document.getElementById('order-summary').innerHTML = `
        <div class="cart-summary" style="max-width:500px; margin: 0 auto;">
          <div class="summary-row" style="font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">
            <span>Items Ordered</span>
          </div>
          ${cart.map(i => `
            <div class="summary-row">
              <span>${i.emoji} ${i.name} × ${i.qty}</span>
              <span>£${(i.price * i.qty).toFixed(2)}</span>
            </div>
          `).join('')}
          <div class="summary-total">
            <span>Total Paid</span>
            <span>£${(total + (total > 75 ? 0 : 5.99)).toFixed(2)}</span>
          </div>
        </div>
      `;
      // Clear cart after checkout
      localStorage.removeItem('lumiere_cart');
    }
  </script>
</body>
</html>

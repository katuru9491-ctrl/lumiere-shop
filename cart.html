<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Lumière</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TEALIUM TAG WILL GO HERE (Step 3) -->
  <script type="text/javascript">
var utag_data = {
}
</script>
<!-- Loading script asynchronously -->
<script type="text/javascript">
    (function(a,b,c,d){
    a='https://tags.tiqcdn.com/utag/analyticsintelligence-training/main/dev/utag.js';
    b=document;c='script';d=b.createElement(c);d.src=a;d.type='text/java'+c;d.async=true;
    a=b.getElementsByTagName(c)[0];a.parentNode.insertBefore(d,a);
    })();
</script>
 
 

  <nav>
    <div class="nav-logo">LUMIÈRE</div>
    <div class="nav-links">
      <a href="index.html">← Continue Shopping</a>
      <a href="cart.html" class="cart-icon">🛒 Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="page-title">Your Cart</div>
    <div class="page-subtitle" id="cart-subtitle"></div>
    <div id="cart-body"></div>
  </div>

  <script>
    function getCart() { return JSON.parse(localStorage.getItem('lumiere_cart') || '[]'); }
    function saveCart(cart) {
      localStorage.setItem('lumiere_cart', JSON.stringify(cart));
      const total = cart.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cart-count').textContent = total;
    }

    function removeItem(id) {
      const cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();
      const subtitle = document.getElementById('cart-subtitle');
      const body = document.getElementById('cart-body');

      if (cart.length === 0) {
        subtitle.textContent = '';
        body.innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h2>Your cart is empty</h2>
            <p style="margin-bottom:24px">Add some products to get started.</p>
            <a href="index.html"><button class="btn">Browse Products</button></a>
          </div>`;
        return;
      }

      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const shipping = subtotal > 75 ? 0 : 5.99;
      const total = subtotal + shipping;

      subtitle.textContent = `${cart.reduce((s, i) => s + i.qty, 0)} item(s) in your cart`;

      body.innerHTML = `
        ${cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-emoji">${item.emoji}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-meta">${item.category} · Qty: ${item.qty}</div>
            </div>
            <div class="cart-item-price">£${(item.price * item.qty).toFixed(2)}</div>
            <button class="btn btn-outline" style="font-size:11px;padding:8px 14px" onclick="removeItem(${item.id})">Remove</button>
          </div>
        `).join('')}

        <div class="cart-summary">
          <div class="summary-row"><span>Subtotal</span><span>£${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : '£' + shipping.toFixed(2)}</span></div>
          ${shipping > 0 ? `<div class="summary-row"><span style="color:var(--accent)">Add £${(75 - subtotal).toFixed(2)} more for free shipping</span></div>` : ''}
          <div class="summary-total"><span>Total</span><span>£${total.toFixed(2)}</span></div>
          <a href="checkout.html">
            <button class="btn btn-large" style="margin-top:20px">Proceed to Checkout</button>
          </a>
        </div>
      `;
    }

    saveCart(getCart());
    renderCart();
  </script>
</body>
</html>
